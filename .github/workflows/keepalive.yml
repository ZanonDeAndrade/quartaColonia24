name: Keep Render Backend Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          echo "Pinging backend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://quartacolonia24.onrender.com/health || true)
          if [ -z "$STATUS" ]; then
            STATUS="000"
          fi
          echo "HTTP status: $STATUS"
